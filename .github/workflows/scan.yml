name: NSE Scanner

on:
  schedule:
    - cron: '30 8 * * 1-5'   # run every weekday at 8:30 AM IST
    - cron: '30 9 * * 1-5'   # run every weekday at 9:30 AM IST
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Generate NSE symbols file
        run: python generate_symbols.py

      - name: Run scanner
        run: python scanner.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
